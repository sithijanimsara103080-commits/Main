<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>RCC Astro Admin</title>
    <link rel="icon" type="image/png" href="https://rccastro.kesug.com/assets/RAS%20Logo.png">
    
    <style>
        /* Hide Scrollbars */
        * { scrollbar-width: none !important; -ms-overflow-style: none !important; }
        *::-webkit-scrollbar { display: none !important; }

        html, body { 
            margin: 0; padding: 0; 
            height: 100%; width: 100%;
            background: #000; font-family: 'Inter', sans-serif;
            overflow: hidden; 
        }

        /* --- LOADER STYLE --- */
        #loader-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #0d0b25, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.6s ease;
        }
        .loader-ring {
            width: 60px; height: 60px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #6c3ce0;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .loader-text { margin-top: 15px; color: white; font-size: 14px; opacity: 0.7; letter-spacing: 1px; }

        /* --- SMOOTH SCROLL WRAPPER --- */
        #main-wrapper { 
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
        }

        /* --- IFRAME CONFIG --- */
        iframe { 
            width: 100%; 
            min-height: 100vh; /* Content එක අනුව auto stretch වෙන්න ඉඩ හරින්න */
            border: none; 
            display: block; 
            overflow: hidden;
        }
    </style>
</head>
<body>

    <!-- Loader -->
    <div id="loader-screen">
        <div class="loader-ring"></div>
        <div class="loader-text">Loading Admin Panel...</div>
    </div>

    <!-- Scroll Wrapper -->
    <div id="main-wrapper">
        <div id="iframe-holder"></div>
    </div>

<script>
    (function(){
        const loader = document.getElementById('loader-screen');
        // Admin Panel Link එක කෙලින්ම ලබා දීම
        const adminUrl = "https://rccastro-admin.lovable.app/"; 
        const f = document.createElement("iframe");
        
        f.src = adminUrl;
        f.setAttribute("scrolling", "no"); // Internal scroll block (Double scroll fix)
        
        // උස ප්‍රමාණය Content එකට ගැලපෙන සේ set කිරීම
        // Admin panel එක dynamic නිසා 100%ක් හෝ නිශ්චිත pixel ප්‍රමාණයක් දීම සුදුසුයි
        f.style.height = "100vh"; 

        f.onload = function() {
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
            }, 600);
        };

        document.getElementById('iframe-holder').appendChild(f);
    })();
</script>
</body>
</html>
